<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Request - Universitas Advent Indonesia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <div class="header">
            <h2>UNIVERSITAS ADVENT INDONESIA</h2>
            <h3>TREASURY DEPARTMENT</h3>
            <h1>PAYMENT REQUEST</h1>
        </div>

        <form id="paymentForm">
            <div class="form-group row-group">
                <div class="half-width">
                    <label>To:</label>
                    <input type="text" value="Disbursement Cashier" readonly class="readonly-text">
                </div>
                <div class="half-width date-field">
                    <label for="date">Date:</label>
                    <input type="date" id="date" name="date" readonly>
                </div>
            </div>

            <div class="form-group">
                <label for="payTo">Please pay to:</label>
                <input type="text" id="payTo" name="payTo" required>
            </div>

            <div class="form-group">
                <label for="amount">Amount (Rp):</label>
                <input type="text" id="amount" name="amount" oninput="formatRibuan(this)" required>
            </div>

            <div class="form-group">
                <label for="words">Words:</label>
                <textarea id="words" name="words" rows="2" readonly></textarea>
            </div>

            <div class="form-group">
                <label for="forPurpose">For:</label>
                <textarea id="forPurpose" name="forPurpose" rows="2" required></textarea>
            </div>

            <div class="form-group">
                <label for="chargeTo">Charge to (Account/Rsce/Fnct):</label>
                <textarea id="chargeTo" name="chargeTo" rows="2" required></textarea>
            </div>

            <div class="form-group">
                <label>Approved by:</label>
                <input type="text" value="Peter Nabut" readonly class="readonly-text">
            </div>

            <div class="form-group notes-section">
                <label>Note:</label>
                <div class="radio-group">
                    <label><input type="radio" name="paymentMethod" value="cash" required> Please give cash</label>
                    <label><input type="radio" name="paymentMethod" value="transfer"> Please transfer</label>
                </div>
            </div>

            <div class="button-group">
                <button type="button" class="print-btn" onclick="prepareAndPrint('text')">Preview & Save (Without QR)</button>
                <button type="button" class="print-btn qr-btn" onclick="prepareAndPrint('qr')">Preview & Save (With QR)</button>
            </div>
        </form>
    </div>

    <div id="print-template">
        <div class="print-header">
            <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Logo-Unai.png" alt="Logo UNAI" class="print-logo" onerror="this.style.display='none'">
            <div class="print-title">
                <h2>UNIVERSITAS ADVENT INDONESIA</h2>
                <h3>Treasury Department</h3>
                <h1>REQUEST FOR PAYMENT</h1>
            </div>
        </div>

        <div class="print-subhead">
            <div class="to-section">To : Disbursement Cashier</div>
            <div class="date-section">Date : <span id="print-date"></span></div>
        </div>

        <div class="print-body">
            <div class="col-left">
                <div class="print-field">
                    <span>Please pay to :</span>
                    <div class="line-input" id="print-payTo"></div>
                </div>
                
                <div class="print-field">
                    <span>For :</span>
                    <div class="line-input multi-line" id="print-for"></div>
                </div>

                <div class="print-note">
                    Note:<br>
                    <div class="checkbox-item">
                        <span>- Please give cash</span>
                        <div class="box" id="box-cash"></div>
                    </div>
                    <div class="checkbox-item">
                        <span>- Please transfer</span>
                        <div class="box" id="box-transfer"></div>
                    </div>
                </div>
            </div>

            <div class="col-right">
                <div class="print-amount-container">
                    <span class="rp-text">Rp.</span>
                    <div class="amount-box" id="print-amount"></div>
                </div>

                <div class="print-words">
                    Words : <strong id="print-words"></strong>
                </div>

                <div class="print-charge">
                    Charge to:<br>
                    <div class="charge-details" id="print-charge"></div>
                </div>

                <div class="print-approved">
                    Approved by,<br>
                    <div id="print-signature"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
